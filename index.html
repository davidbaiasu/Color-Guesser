<!DOCTYPE html>

<html>

<head>
	<title>Color Guesser</title>
	<link href="colorguesser.css" rel="stylesheet">
	<script src="colorguesser.js" defer></script>
</head>

<body>
	<main id="id-game-container">
	
		<div id="id-div-color-square"></div>
		
		<div id="id-div-misc">
			<p id="id-para-attempt">Attempt no. <span id="id-span-attempt">1</span>/10</p>
			<button id="id-button-submit">Submit</button>
		</div>
		
		<div id="id-div-input-fields">
			<div id="id-div-input-red" class="class-input">
				<span>R</span>
				<input id="id-range-red" class="class-range" 
				type="range" min="0" max="255" value="128"></input>
				<span>128</span>
			</div>
			
			<div id="id-div-input-green" class="class-input">
				<span>G</span>
				<input id="id-range-green" class="class-range" 
				type="range" min="0" max="255" value="128"></input>
				<span>128</span>
			</div>
			
			<div id="id-div-input-blue" class="class-input">
				<span>B</span>
				<input id="id-range-blue" class="class-range" 
				type="range" min="0" max="255" value="128"></input>
				<span>128</span>
			</div>
			
		</div>
		
		<div id="id-div-attempts">
			<button id="id-button-prev" class="class-nav-button">&lt;</button>

			<div id="id-current-history-display">
				<p id="id-placeholder-text">No attempts yet</p>
			</div>

			<button id="id-button-next" class="class-nav-button">&gt;</button>
		</div>
		
	</main>
</body>

</html>
